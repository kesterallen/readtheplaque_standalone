{% extends "base.html" %}
{% block title %}Admin Login — PlaqueWorld{% endblock %}
{% block content %}
<div class="login-page">
  <h1 class="login-title">Admin Login</h1>
  <p class="login-sub">Access the approval queue.</p>
  <form method="POST">
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus>
    </div>
    <button type="submit" class="btn-save btn-save--full">Sign In</button>
  </form>
</div>
{% endblock %}
