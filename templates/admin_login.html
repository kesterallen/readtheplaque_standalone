{% extends "base.html" %}
{% block title %}Admin Login — PlaqueWorld{% endblock %}

{% block content %}
<div style="max-width:380px;margin:80px auto;padding:0 24px">
  <h1 style="font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px">Admin Login</h1>
  <p style="color:var(--text-muted);font-size:14px;margin-bottom:28px">Access the approval queue.</p>

  {% if error %}
  <div style="background:#fde8e8;color:#c0392b;border:1px solid #f5c6c6;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:20px">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:7px">Password</label>
      <input type="password" name="password" autofocus
             style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:7px;font-size:15px;background:var(--surface);color:var(--text);box-sizing:border-box;outline:none">
    </div>
    <button type="submit"
            style="width:100%;padding:13px;background:var(--amber);color:#fff;border:none;border-radius:8px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;cursor:pointer">
      Sign in →
    </button>
  </form>
</div>
{% endblock %}
